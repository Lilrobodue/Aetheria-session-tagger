<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#06060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Aetheria — Session Tagger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');
:root{--bg:#06060c;--bg2:#0a0810;--bg3:#0f0a14;--bdr:#1a1520;--dim:#3a3030;--mut:#4a4030;--sub:#5a4a3a;--txt:#e0d8cc;--gld:#d4a574;--grn:#4A7C59;--red:#C45C5C;--pur:#7B50D4;--blu:#5048C4;--mag:#A840B8;--ora:#C47A14}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;max-width:480px;margin:0 auto}
.mono{font-family:'JetBrains Mono',monospace}

.hdr{text-align:center;padding:16px 12px 8px;border-bottom:1px solid var(--bdr)}
.hdr h1{font-size:18px;font-weight:300;color:var(--gld);letter-spacing:.12em}
.hdr .sub{font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:10}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--dim);letter-spacing:.06em;border-bottom:2px solid transparent;cursor:pointer}
.tab.on{color:var(--gld);border-bottom-color:var(--gld)}

.content{padding:12px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:10px}
.card h2{font-size:10px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}

/* Quick tag buttons */
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.cond-btn{padding:12px 8px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg3);color:var(--sub);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;text-align:center}
.cond-btn:hover{border-color:var(--gld)}
.cond-btn.selected{border-width:2px}
.cond-btn .cb-icon{font-size:18px;display:block;margin-bottom:4px}
.cond-btn .cb-label{font-size:11px;font-weight:500}
.cond-btn .cb-sub{font-size:9px;color:var(--dim);margin-top:2px}

/* Sliders */
.slider-group{margin-bottom:10px}
.slider-label{font-size:10px;color:var(--sub);letter-spacing:.05em;margin-bottom:3px;display:flex;justify-content:space-between}
.slider-wrap{display:flex;align-items:center;gap:6px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--gld)}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gld);min-width:20px;text-align:center}

/* Activity chips */
.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.chip{padding:5px 10px;border-radius:12px;border:1px solid var(--bdr);background:var(--bg3);color:var(--sub);font-size:10px;cursor:pointer;transition:all .2s}
.chip.on{border-color:var(--gld);color:var(--gld);background:var(--gld)11}

/* Notes */
textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:8px;border-radius:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:44px}

/* Buttons */
.btn{display:block;width:100%;padding:12px;border-radius:6px;border:1px solid var(--gld);background:transparent;color:var(--gld);font-size:13px;font-family:inherit;letter-spacing:.06em;cursor:pointer;margin-top:8px}
.btn:hover{background:var(--gld);color:var(--bg)}
.btn-grn{border-color:var(--grn);color:var(--grn)}
.btn-grn:hover{background:var(--grn);color:var(--bg)}
.btn-sm{padding:6px 12px;width:auto;display:inline-block;font-size:10px;margin:0}
.btn-red{border-color:var(--red);color:var(--red)}

/* Session log */
.log-entry{border-left:3px solid var(--bdr);padding:8px 0 8px 10px;margin-bottom:10px}
.log-date{font-size:10px;color:var(--dim);margin-bottom:2px}
.log-cond{font-size:12px;font-weight:500;margin-bottom:2px}
.log-metrics{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--sub);margin-bottom:3px}
.log-metric{font-family:'JetBrains Mono',monospace}
.log-notes{font-size:11px;color:var(--sub);font-style:italic;margin-top:3px}

/* Import */
.import-zone{border:2px dashed var(--bdr);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s}
.import-zone:hover{border-color:var(--gld)}
.import-zone input{display:none}

/* Stats */
.stat-row{display:flex;justify-content:space-around;margin:8px 0}
.stat{text-align:center}
.stat-val{font-size:22px;font-weight:300}
.stat-label{font-size:8px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* Saved flash */
.saved{color:var(--grn);font-size:11px;text-align:center;margin-top:6px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}

/* Links tab */
.section-label{font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;text-align:center;margin:20px 0 10px;position:relative}
.section-label::before,.section-label::after{content:'';position:absolute;top:50%;width:50px;height:1px;background:var(--bdr)}
.section-label::before{right:calc(50% + 50px)}
.section-label::after{left:calc(50% + 50px)}
.lnk{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:6px;text-decoration:none;color:var(--txt);transition:all .2s;position:relative}
.lnk:hover{border-color:var(--gld);transform:translateY(-1px)}
.lnk::after{content:'→';position:absolute;right:14px;color:var(--dim);font-size:12px;transition:all .2s}
.lnk:hover::after{color:var(--gld);right:10px}
.lnk-icon{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lnk h3{font-size:13px;font-weight:500;letter-spacing:.02em}
.lnk p{font-size:10px;color:var(--sub);line-height:1.3}
.li-gld{background:linear-gradient(135deg,#d4a57422,#d4a57408);border:1px solid #d4a57433}
.li-pur{background:linear-gradient(135deg,#7B50D422,#7B50D408);border:1px solid #7B50D433}
.li-mag{background:linear-gradient(135deg,#A840B822,#A840B808);border:1px solid #A840B833}
.li-blu{background:linear-gradient(135deg,#5048C422,#5048C408);border:1px solid #5048C433}
.li-grn{background:linear-gradient(135deg,#4A7C5922,#4A7C5908);border:1px solid #4A7C5933}
.li-cor{background:linear-gradient(135deg,#C43A6A22,#C43A6A08);border:1px solid #C43A6A33}
.li-ora{background:linear-gradient(135deg,#C47A1422,#C47A1408);border:1px solid #C47A1433}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sim-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;text-decoration:none;color:var(--txt);transition:all .2s;text-align:center}
.sim-card:hover{border-color:var(--blu);transform:translateY(-1px)}
.sim-card .si{font-size:20px;margin-bottom:4px}
.sim-card h3{font-size:11px;font-weight:500;line-height:1.3}
.sim-card p{font-size:8px;color:var(--dim);margin-top:2px}

/* Lab import */
.lab-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;border:1px solid var(--blu);color:var(--blu);font-family:'JetBrains Mono',monospace;vertical-align:middle}
.import-summary{background:var(--bg2);border:1px solid var(--grn);border-radius:8px;padding:14px;margin-top:10px;text-align:center}
.import-summary h3{font-size:13px;color:var(--grn);margin-bottom:6px;font-weight:500}
.import-summary .is-line{font-size:11px;color:var(--sub);margin-bottom:3px}
.import-summary .is-val{color:var(--gld);font-family:'JetBrains Mono',monospace}
.import-dup{background:var(--bg2);border:1px solid var(--ora);border-radius:8px;padding:14px;margin-top:10px}
.import-dup h3{font-size:12px;color:var(--ora);margin-bottom:8px;text-align:center}
.import-dup p{font-size:10px;color:var(--sub);text-align:center;margin-bottom:8px}
.import-dup .dup-btns{display:flex;gap:6px}
</style>
</head>
<body>
<div class="hdr">
  <h1>AETHERIA</h1>
  <div class="sub">Session Tagger</div>
</div>
<div class="tabs" id="tab-bar">
  <div class="tab on" data-tab="tag">Tag</div>
  <div class="tab" data-tab="log">Log</div>
  <div class="tab" data-tab="data">Data</div>
  <div class="tab" data-tab="link">Links</div>
</div>
<div class="content" id="content"></div>

<script>
// ═══════════════════════════════════════
// AETHERIA SESSION TAGGER
// Lightweight session logging — no rigid schedule
// ═══════════════════════════════════════

const CONDITIONS = [
  {id:'playlist',label:'Alignment Playlist',icon:'🎵',color:'#5048C4',sub:'Gnosis or custom playlist'},
  {id:'silent',label:'Silent',icon:'🤫',color:'#8a7b6b',sub:'Muse only, no music'},
  {id:'breathwork',label:'3-6-9 Breathwork',icon:'🌬',color:'#4A7C59',sub:'27 breaths, no music'},
  {id:'partner',label:'With Partner',icon:'💜',color:'#A840B8',sub:'Present with a loved one'},
  {id:'playlist_partner',label:'Playlist + Partner',icon:'🎵💜',color:'#C43A6A',sub:'Alignment playlist with a loved one'},
  {id:'personal',label:'Personal Music',icon:'🎸',color:'#C47A14',sub:'Your own resonance playlist'},
];
const COND_MAP={};CONDITIONS.forEach(c=>COND_MAP[c.id]=c);
const ACTIVITIES=['Just woke up','Working','Relaxing','Socializing','Exercising','Driving','Stressed','Before bed','Other'];

let state = {
  tab:'tag',
  sessions:[], // [{date,condition,sleep,moodBefore,moodAfter,pain,activity,notes,timestamp}]
  rctSessions:[], // imported EEG data
  // Current form state
  form:{condition:null,sleep:5,moodBefore:5,moodAfter:5,pain:1,activity:null,notes:''},
  lastImportSummary:null,
  importDuplicate:null
};

function save(){try{localStorage.setItem('aetheria-tagger',JSON.stringify({sessions:state.sessions,rctSessions:state.rctSessions}));}catch(e){}}
function load(){
  try{
    const s=localStorage.getItem('aetheria-tagger');
    if(s){const p=JSON.parse(s);state.sessions=p.sessions||[];state.rctSessions=p.rctSessions||[];return true;}
  }catch(e){}
  return false;
}

function getToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Lunar phase
function moonPhase(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  let c2,e,jd,b;let yr=y;let mo=m;
  if(mo<3){yr--;mo+=12;}
  c2=Math.floor(yr/100);b=2-c2+Math.floor(c2/4);
  jd=Math.floor(365.25*(yr+4716))+Math.floor(30.6001*(mo+1))+d+b-1524.5;
  const phase=((jd-2451550.1)/29.530588853)%1;
  const p=phase<0?phase+1:phase;
  if(p<0.0625)return'🌑 New';if(p<0.1875)return'🌒 Waxing Crescent';
  if(p<0.3125)return'🌓 First Quarter';if(p<0.4375)return'🌔 Waxing Gibbous';
  if(p<0.5625)return'🌕 Full';if(p<0.6875)return'🌖 Waning Gibbous';
  if(p<0.8125)return'🌗 Last Quarter';if(p<0.9375)return'🌘 Waning Crescent';
  return'🌑 New';
}

// Match EEG sessions to a date
function utcToLocalDate(isoStr){
  if(!isoStr)return null;
  const d=new Date(isoStr);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function eegForDate(dateStr){
  return state.rctSessions.filter(s=>s.date&&utcToLocalDate(s.date)===dateStr);
}

// CSV parser
function parseRctCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',');
  const sessions=[];
  for(let i=1;i<lines.length;i++){
    const row=[];let field='',inQ=false;
    for(let c=0;c<lines[i].length;c++){
      const ch=lines[i][c];
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){row.push(field);field='';}
      else field+=ch;
    }
    row.push(field);
    const obj={};
    headers.forEach((h,hi)=>{
      let v=row[hi]||'';
      if(v==='NaN'||v==='')v=null;
      else if(!isNaN(v)&&v!==''&&!['date','rx_frequencies','timestamp','i_ching_name'].includes(h.trim()))v=+v;
      obj[h.trim()]=v;
    });
    sessions.push(obj);
  }
  return sessions;
}

// ─── Render ───
function render(){
  const el=document.getElementById('content');
  let h='';
  const f=state.form;
  const today=getToday();
  const moon=moonPhase(new Date());

  if(state.tab==='tag'){
    // Date + moon
    h+=`<div style="text-align:center;margin-bottom:10px">
      <div style="font-size:13px;color:var(--txt)">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
      <div style="font-size:11px;color:var(--dim)">${moon}</div>
    </div>`;

    // Condition select
    h+=`<div class="card"><h2>What did you do?</h2>
      <div class="cond-grid">
        ${CONDITIONS.map(c=>`<div class="cond-btn ${f.condition===c.id?'selected':''}" 
          style="${f.condition===c.id?'border-color:'+c.color+';color:'+c.color+';background:'+c.color+'11':''}" 
          onclick="pickCond('${c.id}')">
          <span class="cb-icon">${c.icon}</span>
          <span class="cb-label">${c.label}</span>
          <span class="cb-sub">${c.sub}</span>
        </div>`).join('')}
      </div>
    </div>`;

    // Quick metrics
    h+=`<div class="card"><h2>How are you feeling?</h2>
      <div class="slider-group">
        <div class="slider-label"><span>Sleep last night</span><span class="mono" style="color:var(--blu)">${f.sleep}/10</span></div>
        <input type="range" min="1" max="10" value="${f.sleep}" oninput="state.form.sleep=+this.value;render()" style="width:100%;accent-color:#5048C4">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Mood before</span><span class="mono" style="color:var(--ora)">${f.moodBefore}/10</span></div>
        <input type="range" min="1" max="10" value="${f.moodBefore}" oninput="state.form.moodBefore=+this.value;render()" style="width:100%;accent-color:#C47A14">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Mood after</span><span class="mono" style="color:var(--gld)">${f.moodAfter}/10</span></div>
        <input type="range" min="1" max="10" value="${f.moodAfter}" oninput="state.form.moodAfter=+this.value;render()" style="width:100%;accent-color:#d4a574">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Pain / symptoms</span><span class="mono" style="color:var(--red)">${f.pain}/10</span></div>
        <input type="range" min="1" max="10" value="${f.pain}" oninput="state.form.pain=+this.value;render()" style="width:100%;accent-color:#C45C5C">
      </div>
    </div>`;

    // Activity
    h+=`<div class="card"><h2>What were you doing before?</h2>
      <div class="chip-row">
        ${ACTIVITIES.map(a=>`<div class="chip ${f.activity===a?'on':''}" onclick="pickActivity('${a}')">${a}</div>`).join('')}
      </div>
    </div>`;

    // Notes
    h+=`<div class="card"><h2>Notes</h2>
      <textarea id="f-notes" placeholder="Anything notable — observations, what music, how it felt...">${f.notes}</textarea>
    </div>`;

    // Save
    h+=`<button class="btn btn-grn" onclick="saveSession()">Save Session Tag</button>`;
    h+=`<div class="saved" id="save-msg">Saved!</div>`;

    // Today's EEG sessions
    const todayEeg=eegForDate(today);
    if(todayEeg.length){
      h+=`<div class="card" style="margin-top:12px"><h2>Today's EEG Data (${todayEeg.length} session${todayEeg.length>1?'s':''})</h2>`;
      todayEeg.forEach(s=>{
        h+=renderEegDetail(s);
      });
      h+=`</div>`;
    }
  }

  // ─── LOG TAB ───
  if(state.tab==='log'){
    // Group sessions by date
    const byDate={};
    state.sessions.forEach(s=>{
      const d=s.date||'unknown';
      if(!byDate[d])byDate[d]=[];
      byDate[d].push(s);
    });
    // Sort dates newest first
    const dates=Object.keys(byDate).sort().reverse();

    // Load imported Coherence Lab sessions grouped by date
    const labSessions=getImportedSessions();
    const labByDate={};
    labSessions.forEach(s=>{
      const d=labSessionDate(s.session_data.metadata);
      if(!labByDate[d])labByDate[d]=[];
      labByDate[d].push(s);
    });

    if(!dates.length&&!state.rctSessions.length&&!labSessions.length){
      h+=`<div style="text-align:center;padding:30px 0;color:var(--sub)">No sessions yet. Go to Tag to log your first session, or import one from the Data tab.</div>`;
    }

    // Also show dates with EEG data but no tags
    const allDates=new Set([...dates]);
    state.rctSessions.forEach(s=>{if(s.date)allDates.add(utcToLocalDate(s.date));});
    Object.keys(labByDate).forEach(d=>allDates.add(d));
    const sortedDates=[...allDates].sort().reverse();

    h+=`<div style="font-size:10px;color:var(--dim);text-align:center;margin-bottom:10px">${state.sessions.length} tagged · ${state.rctSessions.length} EEG · ${labSessions.length} Lab</div>`;

    sortedDates.forEach(date=>{
      const tags=byDate[date]||[];
      const eeg=eegForDate(date);
      const dateObj=new Date(date+'T00:00:00');
      const dateStr=dateObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const moon=moonPhase(dateObj);

      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:12px;color:var(--txt)">${dateStr}</div>
          <div style="font-size:10px;color:var(--dim)">${moon}</div>
        </div>`;

      // Tagged sessions
      tags.forEach(t=>{
        const c=COND_MAP[t.condition];
        const moodDelta=t.moodAfter-t.moodBefore;
        h+=`<div class="log-entry" style="border-color:${c?c.color:'var(--bdr)'}">
          <div class="log-cond" style="color:${c?c.color:'var(--txt)'}">${c?c.icon+' ':''} ${c?c.label:t.condition}</div>
          <div class="log-metrics">
            <span>Sleep: <span class="log-metric" style="color:var(--blu)">${t.sleep}</span></span>
            <span>Mood: <span class="log-metric" style="color:var(--ora)">${t.moodBefore}</span>→<span class="log-metric" style="color:var(--gld)">${t.moodAfter}</span> <span style="color:${moodDelta>=0?'var(--grn)':'var(--red)'}">${moodDelta>=0?'+':''}${moodDelta}</span></span>
            <span>Pain: <span class="log-metric" style="color:var(--red)">${t.pain}</span></span>
            ${t.activity?`<span>${t.activity}</span>`:''}
          </div>
          ${t.notes?`<div class="log-notes">"${t.notes}"</div>`:''}
        </div>`;
      });

      // EEG sessions for this date
      if(eeg.length){
        eeg.forEach(s=>{
          h+=`<div style="padding-left:10px;border-left:3px solid var(--pur);margin-bottom:4px">`;
          h+=renderEegDetail(s);
          h+=`</div>`;
        });
      }

      // Coherence Lab sessions for this date
      const labForDate=labByDate[date]||[];
      labForDate.forEach(s=>{h+=renderLabSessionLog(s);});

      if(!tags.length&&(eeg.length||labForDate.length)){
        h+=`<div style="font-size:9px;color:var(--dim);margin-top:4px">${labForDate.length?'Coherence Lab':'EEG'} data only — no subjective tag for this day</div>`;
      }

      h+=`</div>`;
    });
  }

  // ─── DATA TAB ───
  if(state.tab==='data'){
    // Import
    h+=`<div class="card">
      <h2>Import Session Data</h2>
      <div class="import-zone" onclick="document.getElementById('csv-input').click()">
        <input type="file" id="csv-input" accept=".csv,.json" multiple onchange="importCSVMulti(this)">
        <div style="font-size:12px;color:var(--gld);margin-bottom:4px">Tap to import</div>
        <div style="font-size:10px;color:var(--dim)">Coherence Lab JSON · RCT CSV · Sophia · Athena</div>
      </div>
      ${state.rctSessions.length?`<div style="font-size:10px;color:var(--grn);text-align:center;margin-top:6px">${state.rctSessions.length} EEG sessions loaded</div>`:''}
      ${getLabSessionCount()?`<div style="font-size:10px;color:var(--blu);text-align:center;margin-top:4px">${getLabSessionCount()} Coherence Lab session${getLabSessionCount()!==1?'s':''} imported</div>`:''}
    </div>`;
    if(state.lastImportSummary){
      h+=renderImportSummary(state.lastImportSummary.summary,state.lastImportSummary.metadata);
    }
    if(state.importDuplicate){
      const dup=state.importDuplicate;
      const dupDate=new Date(dup.importedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      h+=`<div class="import-dup">

// Aggregate a Sophia timeline CSV into a single session summary
function aggregateSophiaCSV(rows){
  if(!rows.length)return null;
  const first=rows[0], last=rows[rows.length-1];
  const t0=new Date(first.timestamp), t1=new Date(last.timestamp);
  const durSec=Math.round((t1-t0)/1000);
  const cohVals=rows.map(r=>r.coherence_pct).filter(v=>v!=null);
  const focVals=rows.map(r=>r.focus_pct).filter(v=>v!=null);
  const medVals=rows.map(r=>r.meditation_pct).filter(v=>v!=null);
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
  const bandAvg=key=>{const v=rows.map(r=>r[key]).filter(x=>x!=null);return avg(v);};
  return {
    date: first.timestamp,
    duration_sec: durSec,
    device_type: 'sophia-session',
    avg_coherence: avg(cohVals),
    peak_coherence: cohVals.length?Math.max(...cohVals):null,
    baseline_pos: first.position,
    baseline_freq: first.frequency_hz,
    baseline_geo: first.geometry,
    baseline_dominant: null,
    endstate_pos: last.position,
    endstate_freq: last.frequency_hz,
    endstate_geo: last.geometry,
    endstate_dominant: null,
    positions_moved: (last.position!=null&&first.position!=null)?last.position-first.position:null,
    avg_focus: avg(focVals),
    avg_meditation: avg(medVals),
    avg_delta: bandAvg('delta_pct'),
    avg_theta: bandAvg('theta_pct'),
    avg_alpha: bandAvg('alpha_pct'),
    avg_beta: bandAvg('beta_pct'),
    avg_gamma: bandAvg('gamma_pct'),
    top_state: modeOf(rows.map(r=>r.state).filter(Boolean)),
    top_geometry: modeOf(rows.map(r=>r.geometry).filter(Boolean)),
    readings: rows.length
  };
}

// Get most common value in an array
function modeOf(arr){
  if(!arr.length)return null;
  const counts={};arr.forEach(v=>{counts[v]=(counts[v]||0)+1;});
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

// ─── Coherence Lab Import ───
function labSessionDate(meta){
  if(!meta||!meta.startTime)return 'unknown';
  const d=new Date(meta.startTime);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function validateImportedSession(obj){
  const errors=[];
  if(!obj||typeof obj!=='object'){errors.push('not_json');return{valid:false,errors};}
  if(!obj.metadata||typeof obj.metadata!=='object'||!obj.metadata.sessionId||typeof obj.metadata.sessionId!=='string'){
    errors.push('missing_session_id');
  }
  if(!obj.streams||typeof obj.streams!=='object'){
    errors.push('missing_streams');
  } else if(!Array.isArray(obj.streams.coherence)){
    errors.push('missing_coherence');
  }
  return{valid:errors.length===0,errors};
}

function filterSessionStreams(fullSession){
  const kept=['coherence','bcs','state','prescription','audio','haptic'];
  const filtered={};
  kept.forEach(k=>{filtered[k]=fullSession.streams[k]||[];});
  return{metadata:fullSession.metadata,streams:filtered};
}

function computeSessionSummary(filtered){
  const meta=filtered.metadata;
  const coh=filtered.streams.coherence||[];
  const bcsArr=filtered.streams.bcs||[];
  const st=filtered.streams.state||[];
  const rx=filtered.streams.prescription||[];

  const startT=meta.startTime;
  const endT=meta.endTime;
  const durationSec=(startT&&endT)?Math.round((endT-startT)/1000):0;

  const tcsVals=coh.map(c=>c.tcs).filter(v=>v!=null);
  const peakTCS=tcsVals.length?Math.round(Math.max(...tcsVals)*10)/10:null;
  const meanTCS=tcsVals.length?Math.round(tcsVals.reduce((a,b)=>a+b,0)/tcsVals.length*10)/10:null;

  const bcsVals=bcsArr.map(b=>b.bcs).filter(v=>v!=null);
  const peakBCS=bcsVals.length?Math.round(Math.max(...bcsVals)*10)/10:null;

  const ptEntry=bcsArr.find(b=>b.phaseTransition===true);
  const ptDetected=!!ptEntry;
  const ptTime=ptEntry?ptEntry.t:null;

  const harmonicLocks=coh.filter(c=>c.harm===1.0).length;
  const cascadeFlips=st.filter(s=>s.reason&&s.reason.toLowerCase().includes('flipped')).length;
  const rxPlayed=rx.filter(r=>r.action==='play').length;
  const closingType=st.some(s=>s.to==='CLOSING')?'graceful':'user_stopped';

  return{durationSec,peakTCS,meanTCS,peakBCS,ptDetected,ptTime,harmonicLocks,cascadeFlips,rxPlayed,closingType};
}

function formatPtTime(t,meta){
  if(t==null)return'?';
  if(t>1e10&&meta&&meta.startTime)return Math.round((t-meta.startTime)/1000);
  return Math.round(t);
}

function getExistingSession(sessionId){
  try{const r=localStorage.getItem('aetheria_tagger:session:'+sessionId);return r?JSON.parse(r):null;}catch(e){return null;}
}

function storeImportedSession(filtered,existingRecord){
  const sessionId=filtered.metadata.sessionId;
  const now=new Date().toISOString();
  const record=existingRecord?{
    session_id:existingRecord.session_id,
    source:'aetheria_coherence_lab',
    imported_at:existingRecord.imported_at,
    last_edited_at:now,
    session_data:filtered,
    tags:existingRecord.tags||{}
  }:{
    session_id:sessionId,
    source:'aetheria_coherence_lab',
    imported_at:now,
    last_edited_at:now,
    session_data:filtered,
    tags:{}
  };
  localStorage.setItem('aetheria_tagger:session:'+sessionId,JSON.stringify(record));
  let index=[];
  try{index=JSON.parse(localStorage.getItem('aetheria_tagger:index')||'[]');}catch(e){}
  if(!index.includes(sessionId)){index.unshift(sessionId);localStorage.setItem('aetheria_tagger:index',JSON.stringify(index));}
  return sessionId;
}

function getImportedSessions(){
  let index=[];
  try{index=JSON.parse(localStorage.getItem('aetheria_tagger:index')||'[]');}catch(e){}
  return index.map(id=>getExistingSession(id)).filter(Boolean);
}

function importLabJSON(text){
  let obj;
  try{obj=JSON.parse(text);}catch(e){
    alert("That file couldn't be read as JSON. Make sure you're uploading the file you downloaded from the Coherence Lab (it ends in .json).");
    return;
  }
  const v=validateImportedSession(obj);
  if(!v.valid){
    const err=v.errors[0];
    if(err==='missing_session_id')alert("This file isn't an Aetheria session \u2014 missing required field metadata.sessionId. Are you sure it's from the Coherence Lab?");
    else if(err==='missing_streams')alert("This file doesn't look like a Coherence Lab session \u2014 no streams data found.");
    else if(err==='missing_coherence')alert("This file doesn't look like a Coherence Lab session \u2014 missing coherence stream data.");
    else alert("Couldn't import that file. Please check it's a valid Aetheria Coherence Lab session JSON.");
    return;
  }
  const sessionId=obj.metadata.sessionId;
  const existing=getExistingSession(sessionId);
  if(existing){
    state.importDuplicate={sessionId,importedAt:existing.imported_at,newData:obj,existingRecord:existing};
    render();
    return;
  }
  const filtered=filterSessionStreams(obj);
  storeImportedSession(filtered,null);
  const summary=computeSessionSummary(filtered);
  state.lastImportSummary={summary,metadata:filtered.metadata};
  render();
}

  const meta=record.session_data.metadata;
  const durMin=Math.floor(sum.durationSec/60);
  const durSec=sum.durationSec%60;
  let h='<div class="log-entry" style="border-color:var(--blu)">';
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
  h+='<span class="lab-badge">\u2b21 Coherence Lab</span>';
  h+='<span class="mono" style="font-size:10px;color:var(--sub)">'+durMin+'m '+durSec+'s</span>';
  h+='</div>';
  h+='<div class="log-metrics">';
  h+='<span>Peak TCS: <span class="log-metric" style="color:var(--gld)">'+(sum.peakTCS!=null?sum.peakTCS:'\u2014')+'</span></span>';
  h+='<span>Mean: <span class="log-metric" style="color:var(--sub)">'+(sum.meanTCS!=null?sum.meanTCS:'\u2014')+'</span></span>';
  if(sum.peakBCS!=null)h+='<span>BCS: <span class="log-metric" style="color:var(--pur)">'+sum.peakBCS+'</span></span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--sub);margin-top:2px">';
  if(sum.ptDetected)h+='<span style="color:var(--grn)">\u2b21 Phase transition t='+formatPtTime(sum.ptTime,meta)+'s</span> \u00b7 ';
  h+=sum.harmonicLocks+' harm locks \u00b7 '+sum.cascadeFlips+' flips \u00b7 '+sum.rxPlayed+' Rx';
  h+='</div></div>';
  return h;
}

// Detect CSV type by headers
function detectCSVType(headerLine){
  const h=headerLine.toLowerCase();
  if(h.includes('coherence_pct')&&h.includes('timestamp')&&h.includes('geometry'))return 'sophia';
  return 'rct';
}

window.importCSVMulti=function(input){
  if(!input.files||!input.files.length)return;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      if(file.name.toLowerCase().endsWith('.json')){importLabJSON(e.target.result);}
      else{importCSVText(e.target.result);}
    };
    reader.readAsText(file);
  });
  input.value='';
};

function importCSVText(text){
  const firstLine=text.trim().split('\n')[0];
  const csvType=detectCSVType(firstLine);

  let newSessions;
  if(csvType==='sophia'){
    const rows=parseRctCSV(text);
    const session=aggregateSophiaCSV(rows);
    newSessions=session?[session]:[];
  } else {
    newSessions=parseRctCSV(text);
  }

  const existing=new Set(state.rctSessions.map(s=>s.date+'|'+s.duration_sec));
  let added=0;
  newSessions.forEach(s=>{
    const key=s.date+'|'+s.duration_sec;
    if(!existing.has(key)){state.rctSessions.push(s);existing.add(key);added++;}
  });
  state.rctSessions.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  save();render();
  const label=csvType==='sophia'?'Sophia session':'RCT session';
  alert(added+' new '+label+'(s) imported. Total: '+state.rctSessions.length);
}

window.importCSV=function(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=function(e){importCSVText(e.target.result);};
  reader.readAsText(input.files[0]);
  input.value='';
};

window.exportData=function(fmt){
  const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  let blob,filename;
  if(fmt==='json'){
    blob=new Blob([JSON.stringify({
      system:'Aetheria Session Tagger',
      export_date:new Date().toISOString(),
      tagged_sessions:state.sessions,
      eeg_sessions:state.rctSessions
    },null,2)],{type:'application/json'});
    filename=`aetheria_sessions_${ts}.json`;
  } else {
    const headers='date,condition,moon,sleep,mood_before,mood_after,mood_change,pain,activity,notes,device_type,best_peak_coh,best_avg_coh,best_start_pos,best_end_pos,best_pos_moved,dominant_shift,heart_rate,avg_focus,avg_meditation,avg_delta,avg_theta,avg_alpha,avg_beta,avg_gamma';
    const rows=state.sessions.map(s=>{
      const eeg=eegForDate(s.date);
      const best=eeg.sort((a,b)=>(b.peak_coherence||0)-(a.peak_coherence||0))[0];
      return [s.date,s.condition,s.moon||'',s.sleep,s.moodBefore,s.moodAfter,
        s.moodAfter-s.moodBefore,s.pain,s.activity||'',
        '"'+(s.notes||'').replace(/"/g,"'")+'"',
        best?best.device_type||'':'',
        best?best.peak_coherence:'',best?best.avg_coherence:'',
        best?best.baseline_pos:'',best?best.endstate_pos:'',
        best?best.positions_moved:'',
        best?(best.baseline_dominant||'')+'>'+(best.endstate_dominant||''):'',
        best?best.heart_rate||'':'',
        best?best.avg_focus||'':'',best?best.avg_meditation||'':'',
        best?best.avg_delta||'':'',best?best.avg_theta||'':'',
        best?best.avg_alpha||'':'',best?best.avg_beta||'':'',
        best?best.avg_gamma||'':''
      ].join(',');
    });
    blob=new Blob([headers+'\n'+rows.join('\n')],{type:'text/csv'});
    filename=`aetheria_sessions_${ts}.csv`;
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

window.dupReimport=function(){
  const dup=state.importDuplicate;if(!dup)return;
  const filtered=filterSessionStreams(dup.newData);
  storeImportedSession(filtered,dup.existingRecord);
  const summary=computeSessionSummary(filtered);
  state.lastImportSummary={summary,metadata:filtered.metadata};
  state.importDuplicate=null;
  render();
};
window.dupCancel=function(){state.importDuplicate=null;render();};
window.dupView=function(){
  state.importDuplicate=null;state.tab='log';
  document.querySelectorAll('#tab-bar .tab').forEach(x=>x.classList.remove('on'));
  document.querySelector('#tab-bar .tab[data-tab="log"]').classList.add('on');
  render();
};
window.clearLabSessions=function(){
  if(!confirm('Clear all imported Coherence Lab sessions?'))return;
  let index=[];try{index=JSON.parse(localStorage.getItem('aetheria_tagger:index')||'[]');}catch(e){}
  index.forEach(id=>localStorage.removeItem('aetheria_tagger:session:'+id));
  localStorage.removeItem('aetheria_tagger:index');
  state.lastImportSummary=null;state.importDuplicate=null;
  render();
};

// ─── Tab switching ───
function go(tab){state.tab=tab;render();}
document.querySelectorAll('#tab-bar .tab').forEach(t=>{
  t.addEventListener('click',function(){
    document.querySelectorAll('#tab-bar .tab').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
    go(this.getAttribute('data-tab'));
  });
});

// ─── Service Worker ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ─── Boot ───
load();
render();
</script>
