<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#06060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Aetheria — Session Tagger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap');
:root{--bg:#06060c;--bg2:#0a0810;--bg3:#0f0a14;--bdr:#1a1520;--dim:#3a3030;--mut:#4a4030;--sub:#5a4a3a;--txt:#e0d8cc;--gld:#d4a574;--grn:#4A7C59;--red:#C45C5C;--pur:#7B50D4;--blu:#5048C4;--mag:#A840B8;--ora:#C47A14}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
#app{max-width:900px;margin:0 auto;padding:0 0 40px}
input,select,textarea{font-family:inherit}

/* ─── Header ─── */
.hdr{text-align:center;padding:24px 16px 12px}
.hdr h1{font-size:22px;font-weight:300;color:var(--gld);letter-spacing:.15em}
.hdr .subtitle{font-size:13px;color:var(--dim);font-style:italic;font-weight:300;margin-top:4px}
.hdr-nav{display:flex;justify-content:center;gap:16px;margin-top:8px}
.hdr-nav a{font-size:10px;color:var(--dim);text-decoration:none;letter-spacing:.08em;cursor:pointer}
.hdr-nav a:hover{color:var(--gld)}

/* ─── Back button ─── */
.back-bar{padding:10px 16px;border-bottom:1px solid var(--bdr)}
.back-btn{background:none;border:none;color:var(--dim);font-family:inherit;font-size:12px;cursor:pointer;padding:4px 0;letter-spacing:.04em}
.back-btn:hover{color:var(--gld)}

/* ─── Common ─── */
.content{padding:0 16px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:14px;margin-bottom:10px}
.card h2{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.section-title{font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin:20px 0 10px}

/* ─── Buttons ─── */
.btn{display:block;width:100%;padding:12px;border-radius:6px;border:1px solid var(--gld);background:transparent;color:var(--gld);font-size:13px;font-family:inherit;letter-spacing:.06em;cursor:pointer;margin-top:8px;text-align:center}
.btn:hover{background:var(--gld);color:var(--bg)}
.btn-grn{border-color:var(--grn);color:var(--grn)}.btn-grn:hover{background:var(--grn);color:var(--bg)}
.btn-red{border-color:var(--red);color:var(--red)}.btn-red:hover{background:var(--red);color:var(--bg)}
.btn-mag{border-color:var(--mag);color:var(--mag)}.btn-mag:hover{background:var(--mag);color:var(--bg)}
.btn-blu{border-color:var(--blu);color:var(--blu)}.btn-blu:hover{background:var(--blu);color:var(--bg)}
.btn-sm{padding:6px 12px;width:auto;display:inline-block;font-size:10px;margin:0}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

/* ─── Home actions ─── */
.home-actions{display:flex;gap:8px;margin:16px 0}
.home-actions .btn{margin:0;flex:1;padding:10px 8px;font-size:11px}

/* ─── History rows ─── */
.history-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;text-decoration:none;color:var(--txt)}
.history-row:hover{border-color:var(--gld);transform:translateY(-1px)}
.source-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1.5px solid}
.badge-lab{border-color:var(--blu);color:var(--blu);background:#5048C410}
.badge-sophia{border-color:var(--mag);color:var(--mag);background:#A840B810}
.badge-rct{border-color:var(--pur);color:var(--pur);background:#7B50D410}
.badge-manual{border-color:var(--gld);color:var(--gld);background:#d4a57410}
.row-body{flex:1;min-width:0}
.row-date{font-size:11px;color:var(--sub);margin-bottom:2px}
.row-summary{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-mood{font-size:11px;font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* ─── Empty state ─── */
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;line-height:1.8}
.empty-state strong{color:var(--gld);font-weight:400}

/* ─── Detail grid ─── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}}
.detail-panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:16px;align-self:start}
.detail-panel h2{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}

/* ─── Form fields ─── */
.field-group{margin-bottom:12px}
.field-label{font-size:10px;color:var(--sub);letter-spacing:.05em;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.field-label .fval{font-family:'JetBrains Mono',monospace;color:var(--gld);font-size:11px}
input[type=text],input[type=date],input[type=number],select{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:12px}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus,textarea:focus{outline:none;border-color:var(--gld)}
select{appearance:auto}
textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:12px;resize:vertical;min-height:120px;font-family:inherit}
input[type=range]{width:100%;accent-color:var(--gld)}
.mood-computed{font-family:'JetBrains Mono',monospace;font-size:13px;padding:6px 0}
.saved-flash{color:var(--grn);font-size:12px;text-align:center;padding:8px;opacity:0;transition:opacity .3s}
.saved-flash.show{opacity:1}

/* ─── Source data display ─── */
.src-header{font-size:10px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.src-meta{font-size:11px;color:var(--sub);margin-bottom:3px}
.src-meta .sv{color:var(--gld);font-family:'JetBrains Mono',monospace}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;margin:8px 0}
.metric-row{font-size:11px;color:var(--sub);display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bdr)}
.metric-row:last-child{border-bottom:none}
.metric-row .mv{color:var(--gld);font-family:'JetBrains Mono',monospace}
.event-line{font-size:11px;color:var(--sub);padding:3px 0}
.event-line .eg{color:var(--grn)}
.rx-item{font-size:10px;color:var(--sub);padding:3px 0;border-bottom:1px solid var(--bdr);font-family:'JetBrains Mono',monospace}

/* ─── Sophia snapshots ─── */
.snap-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.snap-card:hover{border-color:var(--mag)}
.snap-head{display:flex;align-items:center;gap:8px;font-size:11px}
.snap-head .st{color:var(--gld);font-family:'JetBrains Mono',monospace}
.snap-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);font-size:10px;color:var(--sub)}
.snap-bands{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.snap-bands span{font-family:'JetBrains Mono',monospace}

/* ─── Import dialogs ─── */
.import-summary{background:var(--bg2);border:1px solid var(--grn);border-radius:8px;padding:14px;margin-top:10px;text-align:center}
.import-summary h3{font-size:13px;color:var(--grn);margin-bottom:6px;font-weight:500}
.import-summary .is-line{font-size:11px;color:var(--sub);margin-bottom:3px}
.import-summary .is-val{color:var(--gld);font-family:'JetBrains Mono',monospace}
.import-dup{background:var(--bg2);border:1px solid var(--ora);border-radius:8px;padding:14px;margin-top:10px}
.import-dup h3{font-size:12px;color:var(--ora);margin-bottom:8px;text-align:center}
.import-dup p{font-size:10px;color:var(--sub);text-align:center;margin-bottom:8px}
.import-dup .dup-btns{display:flex;gap:6px}

/* ─── Links ─── */
.section-label{font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;text-align:center;margin:20px 0 10px;position:relative}
.section-label::before,.section-label::after{content:'';position:absolute;top:50%;width:50px;height:1px;background:var(--bdr)}
.section-label::before{right:calc(50% + 50px)}.section-label::after{left:calc(50% + 50px)}
.lnk{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:6px;text-decoration:none;color:var(--txt);transition:all .2s;position:relative}
.lnk:hover{border-color:var(--gld);transform:translateY(-1px)}
.lnk::after{content:'\2192';position:absolute;right:14px;color:var(--dim);font-size:12px;transition:all .2s}
.lnk:hover::after{color:var(--gld);right:10px}
.lnk-icon{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lnk h3{font-size:13px;font-weight:500;letter-spacing:.02em}
.lnk p{font-size:10px;color:var(--sub);line-height:1.3}
.li-gld{background:linear-gradient(135deg,#d4a57422,#d4a57408);border:1px solid #d4a57433}
.li-pur{background:linear-gradient(135deg,#7B50D422,#7B50D408);border:1px solid #7B50D433}
.li-mag{background:linear-gradient(135deg,#A840B822,#A840B808);border:1px solid #A840B833}
.li-blu{background:linear-gradient(135deg,#5048C422,#5048C408);border:1px solid #5048C433}
.li-grn{background:linear-gradient(135deg,#4A7C5922,#4A7C5908);border:1px solid #4A7C5933}
.li-cor{background:linear-gradient(135deg,#C43A6A22,#C43A6A08);border:1px solid #C43A6A33}
.li-ora{background:linear-gradient(135deg,#C47A1422,#C47A1408);border:1px solid #C47A1433}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sim-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;text-decoration:none;color:var(--txt);transition:all .2s;text-align:center}
.sim-card:hover{border-color:var(--blu);transform:translateY(-1px)}
.sim-card .si{font-size:20px;margin-bottom:4px}
.sim-card h3{font-size:11px;font-weight:500;line-height:1.3}
.sim-card p{font-size:8px;color:var(--dim);margin-top:2px}

/* ─── Export modal ─── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto}
.modal-box h2{font-size:14px;color:var(--gld);text-align:center;letter-spacing:.1em;margin-bottom:16px;font-weight:400}
.modal-section{font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin:14px 0 6px}
.export-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:4px;cursor:pointer;transition:border-color .15s;font-size:12px;color:var(--txt)}
.export-opt:hover{border-color:var(--gld)}
.export-opt.disabled{opacity:.35;cursor:default;pointer-events:none}
.export-opt input[type=checkbox]{accent-color:var(--gld);width:16px;height:16px;cursor:pointer}
.export-opt .eo-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;margin:0}
.modal-small-actions{display:flex;gap:8px;margin-top:8px;justify-content:center}
.modal-small-actions button{background:none;border:none;color:var(--dim);font-family:inherit;font-size:10px;cursor:pointer;padding:4px 8px;letter-spacing:.04em}
.modal-small-actions button:hover{color:var(--gld)}
</style>
</head>
<body>
<div id="app"></div>

<script src="src/storage/tagger-store.js"></script>
<script src="src/import/coherence-lab-import.js"></script>
<script src="src/import/sophia-import.js"></script>
<script src="src/import/rct-import.js"></script>
<script src="src/export/tagger-export.js"></script>
<script>
// ═══════════════════════════════════════
// AETHERIA SESSION TAGGER — UI
// ═══════════════════════════════════════

const MOON_OPTIONS=[
  {v:'unknown',l:'Unknown'},{v:'\u{1F311} New',l:'\u{1F311} New'},{v:'\u{1F312} Waxing Crescent',l:'\u{1F312} Waxing Crescent'},
  {v:'\u{1F313} First Quarter',l:'\u{1F313} First Quarter'},{v:'\u{1F314} Waxing Gibbous',l:'\u{1F314} Waxing Gibbous'},
  {v:'\u{1F315} Full',l:'\u{1F315} Full'},{v:'\u{1F316} Waning Gibbous',l:'\u{1F316} Waning Gibbous'},
  {v:'\u{1F317} Last Quarter',l:'\u{1F317} Last Quarter'},{v:'\u{1F318} Waning Crescent',l:'\u{1F318} Waning Crescent'}
];

let state={
  view:'home',
  currentSessionId:null,
  expandedSnapshots:{},
  lastImportSummary:null,
  importDuplicate:null,
  sophiaImport:null,
  rctImport:null,
  showExportModal:false,
  exportSelection:{lab:false,sophia:false,sophiaSnaps:false,rct:false,manual:false,unified:false,json:false},
  // Legacy data (CSV imports, old tagged sessions)
  sessions:[],
  rctSessions:[]
};

// Legacy save/load for old tagged sessions + EEG
function save(){try{localStorage.setItem('aetheria-tagger',JSON.stringify({sessions:state.sessions,rctSessions:state.rctSessions}));}catch(e){}}
function load(){try{const s=localStorage.getItem('aetheria-tagger');if(s){const p=JSON.parse(s);state.sessions=p.sessions||[];state.rctSessions=p.rctSessions||[];}}catch(e){}}

// ─── Utilities ───
function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function moonPhase(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  let yr=y,mo=m;if(mo<3){yr--;mo+=12;}
  const c2=Math.floor(yr/100),b=2-c2+Math.floor(c2/4);
  const jd=Math.floor(365.25*(yr+4716))+Math.floor(30.6001*(mo+1))+d+b-1524.5;
  const p=((jd-2451550.1)/29.530588853)%1;const pp=p<0?p+1:p;
  if(pp<.0625)return'\u{1F311} New';if(pp<.1875)return'\u{1F312} Waxing Crescent';
  if(pp<.3125)return'\u{1F313} First Quarter';if(pp<.4375)return'\u{1F314} Waxing Gibbous';
  if(pp<.5625)return'\u{1F315} Full';if(pp<.6875)return'\u{1F316} Waning Gibbous';
  if(pp<.8125)return'\u{1F317} Last Quarter';if(pp<.9375)return'\u{1F318} Waning Crescent';
  return'\u{1F311} New';
}
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// CSV parser (preserved for legacy RCT/Sophia CSV imports)
function parseRctCSV(text){const lines=text.trim().split('\n');if(lines.length<2)return[];const headers=lines[0].split(',');const sessions=[];for(let i=1;i<lines.length;i++){const row=[];let field='',inQ=false;for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){row.push(field);field='';}else field+=ch;}row.push(field);const obj={};headers.forEach((h,hi)=>{let v=row[hi]||'';if(v==='NaN'||v==='')v=null;else if(!isNaN(v)&&v!==''&&!['date','rx_frequencies','timestamp','i_ching_name'].includes(h.trim()))v=+v;obj[h.trim()]=v;});sessions.push(obj);}return sessions;}
function aggregateSophiaCSV(rows){if(!rows.length)return null;const first=rows[0],last=rows[rows.length-1];const t0=new Date(first.timestamp),t1=new Date(last.timestamp);const dur=Math.round((t1-t0)/1000);const avg=a=>a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):null;const bAvg=k=>{const v=rows.map(r=>r[k]).filter(x=>x!=null);return avg(v);};const coh=rows.map(r=>r.coherence_pct).filter(v=>v!=null);const foc=rows.map(r=>r.focus_pct).filter(v=>v!=null);const med=rows.map(r=>r.meditation_pct).filter(v=>v!=null);return{date:first.timestamp,duration_sec:dur,device_type:'sophia-session',avg_coherence:avg(coh),peak_coherence:coh.length?Math.max(...coh):null,baseline_pos:first.position,baseline_freq:first.frequency_hz,baseline_geo:first.geometry,endstate_pos:last.position,endstate_freq:last.frequency_hz,endstate_geo:last.geometry,positions_moved:(last.position!=null&&first.position!=null)?last.position-first.position:null,avg_focus:avg(foc),avg_meditation:avg(med),avg_delta:bAvg('delta_pct'),avg_theta:bAvg('theta_pct'),avg_alpha:bAvg('alpha_pct'),avg_beta:bAvg('beta_pct'),avg_gamma:bAvg('gamma_pct'),top_state:modeOf(rows.map(r=>r.state).filter(Boolean)),top_geometry:modeOf(rows.map(r=>r.geometry).filter(Boolean)),readings:rows.length};}
function modeOf(arr){if(!arr.length)return null;const c={};arr.forEach(v=>{c[v]=(c[v]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];}

// ─── Helpers ───
function getLabSessionCount(){return TaggerStore.getIndex().sessions.filter(s=>s.source==='coherence_lab').length;}
function getSophiaSessionCount(){return TaggerStore.getIndex().sessions.filter(s=>s.source==='sophia').length;}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════

function render(){
  const el=document.getElementById('app');
  if(state.view==='detail'&&state.currentSessionId) el.innerHTML=renderDetail(state.currentSessionId);
  else if(state.view==='new-manual') el.innerHTML=renderManualForm();
  else if(state.view==='links') el.innerHTML=renderLinks();
  else el.innerHTML=renderHome();
}

// ─── HOME ───
function renderHome(){
  let h='<div class="hdr"><h1>AETHERIA SESSION TAGGER</h1><div class="subtitle">Your reflections, held.</div>';
  h+='<div class="hdr-nav"><a onclick="nav(\'links\')">Links</a></div></div>';
  h+='<div class="content">';

  // Action buttons
  h+='<div class="home-actions">';
  h+='<button class="btn btn-grn" style="margin:0" onclick="document.getElementById(\'home-import\').click()">+ Import Session</button>';
  h+='<button class="btn" style="margin:0" onclick="nav(\'new-manual\')">+ New Manual Session</button>';
  h+='<button class="btn" style="margin:0;border-color:var(--dim);color:var(--dim)" onclick="openExportModal()">Export</button>';
  h+='</div>';
  h+='<input type="file" id="home-import" accept=".csv,.json" multiple style="display:none" onchange="handleFileImport(this)">';

  // Import dialogs
  if(state.sophiaImport) h+=renderSophiaImportDialog(state.sophiaImport);
  if(state.rctImport) h+=renderRCTImportDialog(state.rctImport);
  if(state.lastImportSummary){
    if(state.lastImportSummary.type==='sophia') h+=renderSophiaImportSummary(state.lastImportSummary);
    else if(state.lastImportSummary.type==='rct') h+=renderRCTImportSummary(state.lastImportSummary);
    else h+=renderLabImportSummary(state.lastImportSummary);
  }
  if(state.importDuplicate){
    const dup=state.importDuplicate;
    const dd=new Date(dup.importedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    h+='<div class="import-dup"><h3>Session already imported</h3>';
    h+='<p>This session was imported on '+dd+'. What would you like to do?</p>';
    h+='<div class="dup-btns">';
    h+='<button class="btn btn-sm" style="flex:1" onclick="dupView()">View existing</button>';
    h+='<button class="btn btn-sm btn-grn" style="flex:1" onclick="dupReimport()">Re-import (keep tags)</button>';
    h+='<button class="btn btn-sm btn-red" style="flex:1" onclick="dupCancel()">Cancel</button>';
    h+='</div></div>';
  }

  // History
  const idx=TaggerStore.getIndex();
  if(!idx.sessions.length){
    h+='<div class="empty-state">Welcome to the <strong>Aetheria Session Tagger</strong>.<br>Your biofield sessions, your subjective context,<br>held together on your device.<br><br>Import a session from the Coherence Lab or Sophia to begin.</div>';
  } else {
    h+='<div class="section-title" style="margin-top:16px">History</div>';
    idx.sessions.forEach(function(entry){

// ─── Source renderers ───
function renderSourceLab(rec){
  const ri=rec.raw_import||{};
  const sum=ri.summary||{};
  const ses=ri.session||{};
  const meta=ri.metadata||{};
  const dur=ses.duration_seconds||0;
  const dm=Math.floor(dur/60),ds=dur%60;
  let h='<h2>Coherence Lab Session</h2>';
  h+='<div class="src-meta">Duration: <span class="sv">'+dm+' min '+ds+' sec</span></div>';
  if(meta.softwareVersion)h+='<div class="src-meta">Software: <span class="sv">v'+meta.softwareVersion+'</span></div>';

  h+='<div class="section-title">Metrics</div>';
  h+='<div class="metric-grid">';
  h+=metricRow('Peak TCS',sum.peak_tcs);h+=metricRow('Mean TCS',sum.mean_tcs);
  h+=metricRow('Peak BCS',sum.peak_bcs);h+=metricRow('Mean BCS',sum.mean_bcs);
  h+='</div>';

  h+='<div class="section-title">Events</div>';
  if(sum.phase_transition_detected){
    const pt=sum.phase_transition_time_seconds;
    h+='<div class="event-line"><span class="eg">\u2b21 Phase transition detected at t='+(pt!=null?CoherenceLabImport.formatPtTime(pt,meta):'?')+'s \u2713</span></div>';
  } else {
    h+='<div class="event-line">No phase transition detected</div>';
  }
  h+='<div class="event-line">'+(sum.harm_one_count||0)+' harmonic lock events (harm=1.0)</div>';
  h+='<div class="event-line">'+(sum.cascade_flips||0)+' cascade flips</div>';
  h+='<div class="event-line">Closed '+(sum.closing_type==='graceful'?'gracefully':'by user')+'</div>';

  const rxPlayed=(rec.source_data||{}).prescriptions_played||[];
  if(rxPlayed.length){
    h+='<div class="section-title">Prescriptions Played ('+rxPlayed.length+')</div>';
    rxPlayed.forEach(function(rx){
      const parts=['t='+Math.round(rx.t||0)+'s'];
      if(rx.frequency)parts.push(rx.frequency+' Hz');
      h+='<div class="rx-item">'+parts.join(' \u00b7 ')+'</div>';
    });
  }

  h+='<div style="margin-top:12px;font-size:10px;color:var(--dim);font-style:italic">Auto-populated from imported session. To annotate, use the Notes field.</div>';
  return h;
}

function renderSourceSophia(rec){
  const sd=rec.source_data||{};
  const sum=sd.summary||{};
  const snaps=sd.snapshots||[];
  let h='<h2>Sophia Session</h2>';
  h+='<div class="src-meta">Device: <span class="sv">'+(sd.device||'—')+' ('+SophiaImport.formatDeviceName(sd.device_type)+')</span></div>';
  h+='<div class="src-meta">Snapshots: <span class="sv">'+snaps.length+'</span></div>';
  if(sd.first_snapshot_at)h+='<div class="src-meta">First: <span class="sv">'+fmtDate(sd.first_snapshot_at.slice(0,10))+' '+fmtTime(sd.first_snapshot_at)+'</span></div>';
  if(sd.last_snapshot_at&&snaps.length>1)h+='<div class="src-meta">Last: <span class="sv">'+fmtDate(sd.last_snapshot_at.slice(0,10))+' '+fmtTime(sd.last_snapshot_at)+'</span></div>';

  h+='<div class="section-title">Summary</div>';
  if(sum.dominant_regime)h+='<div class="src-meta">Dominant Regime: <span class="sv">'+sum.dominant_regime+'</span></div>';
  if(sum.dominant_geometry)h+='<div class="src-meta">Dominant Geometry: <span class="sv">'+sum.dominant_geometry+'</span></div>';
  if(sum.hexagrams_encountered&&sum.hexagrams_encountered.length){
    // Get names from snapshots
    const hexLabels=[];const seen={};
    snaps.forEach(function(s){
      const sym=s.symbolic||{};
      if(sym.i_ching_hexagram!=null){
        const k=sym.i_ching_hexagram;
        if(!seen[k]){seen[k]=true;hexLabels.push('#'+k+(sym.i_ching_name?' '+sym.i_ching_name:''));}
      }
    });
    if(hexLabels.length)h+='<div class="src-meta">Hexagrams: <span class="sv">'+hexLabels.join(', ')+'</span></div>';
  }
  h+='<div class="metric-grid">';
  h+=metricRow('Mean Coherence',sum.mean_coherence!=null?sum.mean_coherence+'%':null);
  h+=metricRow('Peak Coherence',sum.peak_coherence!=null?sum.peak_coherence+'%':null);
  h+=metricRow('Mean Focus',sum.mean_focus!=null?sum.mean_focus+'%':null);
  h+=metricRow('Mean Meditation',sum.mean_meditation!=null?sum.mean_meditation+'%':null);
  h+='</div>';

  // Snapshots (expandable)
  if(snaps.length){
    h+='<div class="section-title">Snapshots ('+snaps.length+')</div>';
    snaps.forEach(function(s,i){
      const expanded=!!state.expandedSnapshots[i];
      const time=s.t?fmtTime(s.t):'';
      const sym=s.symbolic||{};
      const met=s.metrics||{};
      h+='<div class="snap-card" onclick="toggleSnap('+i+')">';
      h+='<div class="snap-head">';
      h+='<span class="st">'+time+'</span>';
      if(s.position!=null)h+=' Pos '+s.position+'/27';
      if(s.frequency_hz)h+=' \u00b7 '+s.frequency_hz+' Hz';
      if(s.regime)h+=' '+s.regime;
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--sub);margin-top:2px">';
      const parts=[];
      if(sym.geometry)parts.push(sym.geometry);
      if(sym.state)parts.push(sym.state);
      if(sym.keyword)parts.push(sym.keyword);
      h+=parts.join(' \u00b7 ');
      if(sym.i_ching_hexagram!=null) h+='<br>\u2637 #'+sym.i_ching_hexagram+(sym.i_ching_name?' '+sym.i_ching_name:'');
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--sub);margin-top:2px">';
      if(met.coherence!=null)h+='Coh '+met.coherence+'% ';
      if(met.focus!=null)h+='Focus '+met.focus+'% ';
      if(met.meditation!=null)h+='Med '+met.meditation+'% ';
      if(s.heart_rate!=null)h+='HR '+s.heart_rate;
      h+='</div>';
      if(expanded){
        h+='<div class="snap-detail">';
        const bp=s.band_powers||{};
        h+='<div class="snap-bands">';
        const bColors={delta:'#5048C4',theta:'#7B50D4',alpha:'#4A7C59',beta:'#C47A14',gamma:'#A840B8'};
        ['delta','theta','alpha','beta','gamma'].forEach(function(b){
          if(bp[b]!=null)h+='<span style="color:'+bColors[b]+'">'+b[0].toUpperCase()+' '+Math.round(bp[b]*100)+'%</span>';
        });
        h+='</div>';
        if(s.fnirs){
          h+='<div style="margin-top:4px;font-size:9px;color:var(--dim)">fNIRS: ';
          ['LI','RI','LO','RO'].forEach(function(ch){
            if(s.fnirs[ch])h+=ch+' SQI:'+((s.fnirs[ch].sqi||0)*100).toFixed(0)+'% ';
          });
          h+='</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    });
  }

  h+='<div style="margin-top:12px;font-size:10px;color:var(--dim);font-style:italic">Auto-populated from Sophia exports. To annotate, use the Notes field.</div>';
  return h;
}

function renderSourceRCT(rec){
  const sd=rec.source_data||{};
  const bl=sd.baseline||{};
  const es=sd.endstate||{};
  const dur=sd.duration_seconds||0;
  const dm=Math.floor(dur/60),ds=dur%60;
  let h='<h2>RCT Session</h2>';
  h+='<div class="src-meta">Duration: <span class="sv">'+dm+' min '+ds+' sec</span></div>';

  h+='<div class="section-title">Journey</div>';
  const startParts=[];
  if(bl.position!=null) startParts.push('Pos '+bl.position+'/27');
  if(bl.geometry) startParts.push(bl.geometry);
  if(bl.frequency_hz) startParts.push(bl.frequency_hz+' Hz');
  h+='<div class="src-meta">Start: <span class="sv">'+(startParts.join(' \u00b7 ')||'\u2014')+'</span></div>';
  const endParts=[];
  if(es.position!=null) endParts.push('Pos '+es.position+'/27');
  if(es.geometry) endParts.push(es.geometry);
  if(es.frequency_hz) endParts.push(es.frequency_hz+' Hz');
  h+='<div class="src-meta">End: <span class="sv">'+(endParts.join(' \u00b7 ')||'\u2014')+'</span></div>';
  if(typeof sd.positions_moved==='number'){
    const pm=sd.positions_moved;
    const dir=pm>0?'ascended':pm<0?'descended':'stayed';
    h+='<div class="src-meta">Moved: <span class="sv">'+(pm>=0?'+':'')+pm+' positions ('+dir+')</span></div>';
  }
  if(bl.dominant_wave||es.dominant_wave){
    h+='<div class="src-meta">Dominant wave: <span class="sv">'+(bl.dominant_wave||'\u2014')+' \u2192 '+(es.dominant_wave||'\u2014')+'</span></div>';
  }

  h+='<div class="section-title">Coherence</div>';
  h+='<div class="metric-grid">';
  h+=metricRow('Baseline',bl.coherence!=null?bl.coherence+'%':null);
  h+=metricRow('Peak',sd.peak_coherence!=null?sd.peak_coherence+'%':null);
  h+=metricRow('Average',sd.avg_coherence!=null?sd.avg_coherence+'%':null);
  h+=metricRow('End',es.coherence!=null?es.coherence+'%':null);
  h+='</div>';

  const rxDetail=sd.prescriptions_detail||[];
  if(rxDetail.length){
    h+='<div class="section-title">Prescriptions ('+rxDetail.length+')</div>';
    rxDetail.forEach(function(rx){
      const parts=[rx.freq+' Hz'];
      if(rx.keyword) parts.push(rx.keyword);
      if(rx.script) parts.push(rx.script);
      if(rx.geometry) parts.push(rx.geometry);
      if(rx.hexagram!=null) parts.push('\u2637 #'+rx.hexagram+(rx.hexagram_name?' '+rx.hexagram_name:''));
      h+='<div class="rx-item">'+escHtml(parts.join(' \u00b7 '))+'</div>';
    });
  }

  h+='<div style="margin-top:12px;font-size:10px;color:var(--dim);font-style:italic">Auto-populated from RCT export. To annotate, use the Notes field.</div>';
  return h;
}

function renderLabImportSummary(info){

// ─── File import (unified) ───
window.handleFileImport=function(input){
  if(!input.files||!input.files.length)return;
  Array.from(input.files).forEach(function(file){
    const reader=new FileReader();
    reader.onload=function(e){
      if(file.name.toLowerCase().endsWith('.json')){
        importJSONText(e.target.result);
      } else {
        importCSVText(e.target.result);
      }
    };
    reader.readAsText(file);
  });
  input.value='';
};

function importJSONText(text){
  let obj;try{obj=JSON.parse(text);}catch(e){alert("That file couldn't be read as JSON.");return;}
  if(!obj||typeof obj!=='object'){alert("That file couldn't be read as JSON.");return;}
  if(CoherenceLabImport.detectCoherenceLabFormat(obj)!==null){importLabJSON(text);return;}
  if(SophiaImport.detectSophiaFormat(obj)){handleSophiaImport(text);return;}
  if(RCTImport.detectRCTFormat(obj)){handleRCTImport(text);return;}
  alert("This doesn't match any known Aetheria format. Supported: Coherence Lab JSON, Sophia JSON, RCT JSON.");
}

function importLabJSON(text){
  const result=CoherenceLabImport.importCoherenceLabFile(text);
  if(result.status==='error'){alert(result.error);return;}
  if(result.status==='duplicate'){
    state.importDuplicate={sessionId:result.record.session_id,importedAt:result.existingRecord.imported_at,newRecord:result.record,existingRecord:result.existingRecord};
    render();return;
  }
  try{TaggerStore.saveSession(result.record);}catch(e){alert(e.message);return;}
  state.lastImportSummary={summary:CoherenceLabImport.computeSessionSummary(result.record),record:result.record};
  render();
}

function handleSophiaImport(text){
  const result=SophiaImport.importSophiaFile(text);
  if(result.status==='error'){alert(result.error);return;}
  state.sophiaImport={parsedExport:result.parsedExport,recentSessions:result.recentSessions,selectedOption:'new'};
  state.lastImportSummary=null;state.importDuplicate=null;render();
}

// ─── CSV import (legacy) ───
function detectCSVType(h){const l=h.toLowerCase();if(l.includes('coherence_pct')&&l.includes('timestamp')&&l.includes('geometry'))return'sophia';return'rct';}
function importCSVText(text){
  const firstLine=text.trim().split('\n')[0];const csvType=detectCSVType(firstLine);
  let ns;if(csvType==='sophia'){const rows=parseRctCSV(text);const s=aggregateSophiaCSV(rows);ns=s?[s]:[];}else{ns=parseRctCSV(text);}
  const existing=new Set(state.rctSessions.map(s=>s.date+'|'+s.duration_sec));let added=0;
  ns.forEach(s=>{const k=s.date+'|'+s.duration_sec;if(!existing.has(k)){state.rctSessions.push(s);existing.add(k);added++;}});
  state.rctSessions.sort((a,b)=>(b.date||'').localeCompare(a.date||''));save();render();
  alert(added+' new '+(csvType==='sophia'?'Sophia':'RCT')+' session(s) imported.');
}

function _exportCounts(){
  const all=TaggerStore.listAllSessions();
  const lab=all.filter(function(r){return r.source==='coherence_lab';});

  const rct=all.filter(function(r){return r.source==='rct';});

  var snapCount=0;

  return{all:all,lab:lab,sophia:sophia,rct:rct,manual:manual,total:all.length,snapCount:snapCount};

window.executeExport=function(){
  var sel=state.exportSelection;
  var c=_exportCounts();
  var today=new Date().toISOString().slice(0,10);
  var downloads=[];

  if(sel.lab&&c.lab.length)downloads.push({content:TaggerExport.exportCoherenceLabCSV(c.lab),name:'aetheria-coherence-lab-sessions_'+today+'.csv',mime:'text/csv'});
  if(sel.sophia&&c.sophia.length)downloads.push({content:TaggerExport.exportSophiaCSV(c.sophia),name:'aetheria-sophia-sessions_'+today+'.csv',mime:'text/csv'});
  if(sel.sophiaSnaps&&c.snapCount)downloads.push({content:TaggerExport.exportSophiaSnapshotsCSV(c.sophia),name:'aetheria-sophia-snapshots_'+today+'.csv',mime:'text/csv'});
  if(sel.rct&&c.rct.length)downloads.push({content:TaggerExport.exportRCTCSV(c.rct),name:'aetheria-rct-sessions_'+today+'.csv',mime:'text/csv'});
  if(sel.manual&&c.manual.length)downloads.push({content:TaggerExport.exportManualCSV(c.manual),name:'aetheria-manual-sessions_'+today+'.csv',mime:'text/csv'});
  if(sel.unified&&c.total)downloads.push({content:TaggerExport.exportUnifiedCSV(c.all),name:'aetheria-unified_'+today+'.csv',mime:'text/csv'});
  if(sel.json&&c.total)downloads.push({content:TaggerExport.exportFullJSON(c.all),name:'aetheria-full_'+today+'.json',mime:'application/json'});

  if(!downloads.length){alert('Select at least one export format.');return;}

  // Sequential downloads with small delay between
  downloads.forEach(function(dl,i){
    setTimeout(function(){TaggerExport.downloadAsFile(dl.content,dl.name,dl.mime);},i*300);
  });

  state.showExportModal=false;
  render();
};

// ─── Session detail save ───
window.saveDetail=function(sessionId){
  const rec=TaggerStore.loadSession(sessionId);if(!rec)return;
  const gv=function(id){const el=document.getElementById(id);return el?el.value:null;};
  const gn=function(id){const v=gv(id);return v!==null&&v!==''?parseFloat(v):null;};
  const gi=function(id){const v=gv(id);return v!==null&&v!==''?parseInt(v,10):null;};

  rec.session_date=gv('session_date')||rec.session_date;
  rec.context={
    condition:gv('ctx_condition')||'',
    moon:gv('ctx_moon')||'unknown',
    sleep:gn('ctx_sleep'),
    mood_before:gi('ctx_mood_before'),
    mood_after:gi('ctx_mood_after'),
    mood_change:null,
    pain:gi('ctx_pain'),
    activity:gv('ctx_activity')||'',
    notes:gv('ctx_notes')||''
  };
  if(typeof rec.context.mood_before==='number'&&typeof rec.context.mood_after==='number'){
    rec.context.mood_change=rec.context.mood_after-rec.context.mood_before;
  }
  // For manual sessions, save description
  if(rec.source==='manual'){
    const desc=gv('manual_desc');
    if(desc!=null)rec.source_data={description:desc};
  }
  try{TaggerStore.saveSession(rec);}catch(e){alert(e.message);return;}
  const flash=document.getElementById('detail-saved');
  if(flash){flash.classList.add('show');setTimeout(function(){flash.classList.remove('show');},2000);}
};

};

      condition:gv('ctx_condition')||'',
      moon:gv('ctx_moon')||'unknown',
      sleep:gn('ctx_sleep'),
      mood_before:mb,
      mood_after:ma,
      mood_change:(typeof mb==='number'&&typeof ma==='number')?ma-mb:null,
      pain:gi('ctx_pain'),
      activity:gv('ctx_activity')||'',
      notes:gv('ctx_notes')||''
    },
    source_data:{description:gv('manual_desc')||''},
    raw_import:null
  };
  try{TaggerStore.saveSession(rec);}catch(e){alert(e.message);return;}
  nav('home');
};

// ─── Snapshot toggle ───
window.toggleSnap=function(i){state.expandedSnapshots[i]=!state.expandedSnapshots[i];render();};

// ═══════════════════════════════════════
// NAVIGATION (hash-based)
// ═══════════════════════════════════════

function nav(view,param){
  if(view==='detail'&&param) location.hash='#session/'+param;
  else if(view==='new-manual') location.hash='#new-manual';
  else if(view==='links') location.hash='#links';
  else location.hash='#home';
}

function parseHash(){
  const h=location.hash||'#home';
  if(h.startsWith('#session/')){
    state.view='detail';state.currentSessionId=h.slice(9);state.expandedSnapshots={};
  } else if(h==='#new-manual'){
    state.view='new-manual';state.currentSessionId=null;
  } else if(h==='#links'){
    state.view='links';state.currentSessionId=null;
  } else {
    state.view='home';state.currentSessionId=null;
  }
}

window.addEventListener('hashchange',function(){parseHash();render();});

// ─── Service Worker ───
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}

// ─── Boot ───
TaggerStore.init().then(function(){
  load();
  parseHash();
  render();
}).catch(function(err){
  console.error('Storage init failed:', err);
  load();
  parseHash();
  render();
});
</script>
</body>
</html>
